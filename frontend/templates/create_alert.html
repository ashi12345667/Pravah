<!DOCTYPE html>
<html>
<head>
    <title>Create Alert</title>
    <style>
        body { background: #1E1E2F; color: white; font-family: Arial, sans-serif; padding: 40px; }

        .box {
            width: 400px;
            margin: auto;
            background: #27293D;
            padding: 25px;
            border-radius: 10px;
        }

        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 6px;
        }

        button {
            background: #00C6FF;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

        a { 
            color: #00C6FF; 
            display: inline-block; 
            margin-top: 10px; 
            text-decoration: none; 
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🚨 Create Alert</h2>

    <form method="POST" action="/trigger-alert">
        <label>Choose Junction:</label>
        <select name="junction">
            {% for j in junctions %}
                <option>{{ j.name }}</option>
            {% endfor %}
        </select>

        <label>Alert Type:</label>
        <select name="alert_type">
            <option>Emergency Vehicle</option>
            <option>Traffic Jam</option>
            <option>Signal Malfunction</option>
        </select>

        <button type="submit">Submit Alert</button>
    </form>

    <a href="/">⬅ Back to Dashboard</a>
</div>

</body>
</html>
