<!DOCTYPE html>
<html>
<head>
    <title>🚦 Smart Traffic Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body { margin: 0; background: #111729; font-family: 'Segoe UI', sans-serif; }

        .sidebar {
            width: 260px; background: #1B1F38; height: 100vh;
            color: white; padding: 25px; position: fixed;
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.4);
        }

        .title {
            font-size: 24px; font-weight: bold; display: flex; gap: 10px;
            align-items: center; color:#00C6FF;
        }

        .nav-btn {
            text-decoration: none; text-align: center;
            background: #00C6FF; color: black;
            padding: 12px; border-radius: 8px; font-size: 15px;
            font-weight: bold; transition: 0.3s;
        }
        .nav-btn:hover { background: #14D5FF; }

        .map-container { margin-left: 260px; height: 100vh; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="title">🚦 Smart Traffic</div>

    <a href="/alerts" class="nav-btn">📌 Alerts Panel</a>
    <a href="/create-alert" class="nav-btn">⚠️ Create Alert</a> <!-- NEW BUTTON -->
</div>

<div class="map-container">
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const junctions = JSON.parse(`{{ junctions | tojson | safe }}`);
const alerts = JSON.parse(`{{ alerts | tojson | safe }}`);

var map = L.map('map').setView([22.97, 78.65], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom: 19
}).addTo(map);

const iconBase = "/static/icons/";

var signalIcons = {
    green: L.icon({ iconUrl: iconBase + "greenlight.jpg", iconSize: [25,25], iconAnchor:[12,25] }),
    yellow: L.icon({ iconUrl: iconBase + "yellow-traffic-lights.webp", iconSize: [25,25], iconAnchor:[12,25] }),
    red: L.icon({ iconUrl: iconBase + "redlight.jpg", iconSize: [25,25], iconAnchor:[12,25] })
};

var alertIcon = L.divIcon({
    className: "alert-icon",
    html:`<div style="width:18px;height:18px;border-radius:50%;background:#ff3b30;box-shadow:0 0 10px #ff3b30;"></div>`
});

junctions.forEach(j => {
    L.marker([j.lat, j.lng], { icon: signalIcons[j.signal] })
        .addTo(map)
        .bindPopup(`<b>${j.name}</b><br>Signal: <strong>${j.signal.toUpperCase()}</strong>`);
});

alerts.forEach(a => {
    const match = junctions.find(j => j.name === a.junction);
    if (match) {
        L.marker([match.lat, match.lng], { icon: alertIcon })
            .addTo(map)
            .bindPopup(`<b>🚨 ALERT</b><br>${a.alert_type}<br><small>${a.time}</small>`);
    }
});
</script>

</body>
</html>
